name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    # =====================
    # ENV (future-proof + debug)
    # =====================
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # =====================
      # 1. Checkout
      # =====================
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================
      # 2. Setup Java + Maven cache
      # =====================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # =====================
      # 3. Build project
      # =====================
      - name: Build with Maven
        run: |
          cd backend
          mvn clean package -DskipTests

      # =====================
      # 4. VERIFY SSH KEY (IMPORTANT DEBUG STEP)
      # =====================
      - name: Verify SSH Key
        run: |
          echo "SSH key length check:"
          echo "${{ secrets.EC2_SSH_KEY }}" | wc -c

      # =====================
      # 5. SCP DEPLOY TO EC2
      # =====================
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/target/backend-0.0.1.jar"
          target: "/home/ubuntu/"

      # =====================
      # 6. SSH DEPLOY + RESTART
      # =====================
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "📦 Creating app directory..."
            sudo mkdir -p /opt/myapp

            echo "📦 Moving JAR..."
            sudo mv /home/ubuntu/backend-0.0.1.jar /opt/myapp/app.jar

            echo "🔄 Reload systemd..."
            sudo systemctl daemon-reload || true

            echo "🚀 Restart service..."
            sudo systemctl restart mpbe || sudo systemctl start mpbe

            echo "✅ Deployment successful!"
