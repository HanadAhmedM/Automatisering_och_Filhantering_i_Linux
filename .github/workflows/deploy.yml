name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =====================
      # 1. CHECKOUT
      # =====================
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================
      # 2. SETUP JAVA
      # =====================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # =====================
      # 3. BUILD PROJECT
      # =====================
      - name: Build with Maven
        run: |
          cd backend
          mvn clean package -DskipTests

      # =====================
      # 4. DEBUG SSH KEY (VERIFIERA DIREKT)
      # =====================
      - name: Verify SSH Key (length check)
        run: |
          echo "Checking SSH key length..."
          echo "${{ secrets.EC2_SSH_KEY }}" | wc -c

      # =====================
      # 5. COPY JAR TO EC2
      # =====================
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/target/backend-0.0.1.jar"
          target: "/home/ubuntu/"

      # =====================
      # 6. DEPLOY ON EC2
      # =====================
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "📦 Creating app directory..."
            sudo mkdir -p /opt/myapp

            echo "📦 Moving jar..."
            sudo mv /home/ubuntu/backend-0.0.1.jar /opt/myapp/app.jar

            echo "🔄 Reloading systemd..."
            sudo systemctl daemon-reload || true

            echo "🚀 Restarting service..."
            sudo systemctl restart mpbe || sudo systemctl start mpbe

            echo "✅ Deployment finished!"
